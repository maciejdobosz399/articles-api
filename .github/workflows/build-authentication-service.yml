name: Build & Push AuthenticationService

on:
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ vars.REGISTRY_URL }}/authentication-service

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: AuthenticationService/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # --------------------------
      # Deploy to Web App for Containers
      # --------------------------
      - name: Set Web App container image
        run: |
          az webapp config container set \
            --name ${{ vars.AUTH_WEBAPP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --container-image-name ${{ env.IMAGE_NAME }}:latest \
            --docker-registry-server-url https://${{ vars.REGISTRY_URL }} \
            --docker-registry-server-user ${{ vars.REGISTRY_USERNAME }} \
            --docker-registry-server-password ${{ secrets.REGISTRY_PASSWORD }} \

      - name: Restart Web App
        run: |
          az webapp restart \
            --name ${{ vars.AUTH_WEBAPP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }}